version: '3.8'
services:
  banking-api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=Development
    networks:
      - banking-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  banking-network:
    driver: bridge
